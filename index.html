<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibhor Mathur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #d9d9d9;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .card {
      text-align: center;
      max-width: 480px;
      width: 100%;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Avatar */
    .avatar-wrap {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 28px;
      background-color: #e8ddd0;
      /* Subtle shadow to lift off the grey bg */
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    .avatar-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* Name */
    h1 {
      font-size: clamp(2rem, 6vw, 2.75rem);
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }

    /* Bio */
    .bio {
      font-size: 1rem;
      line-height: 1.65;
      color: #3a3a3a;
      margin-bottom: 10px;
      padding: 0 8px;
    }

    /* Tagline */
    .tagline {
      font-size: 0.95rem;
      color: #5a5a5a;
      margin-bottom: 32px;
    }

    /* Buttons */
    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 13px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.18s ease, color 0.18s ease, transform 0.12s ease;
      display: inline-block;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-outline {
      background: #ffffff;
      color: #1a1a1a;
      border: 2px solid #1a1a1a;
    }

    .btn-outline:hover {
      background: #1a1a1a;
      color: #ffffff;
    }

    .btn-solid {
      background: #1a1a1a;
      color: #ffffff;
      border: 2px solid #1a1a1a;
    }

    .btn-solid:hover {
      background: #333;
      border-color: #333;
    }

    /* Social icons */
    .socials {
      display: flex;
      gap: 18px;
      justify-content: center;
      align-items: center;
    }

    .socials a {
      color: #888;
      transition: color 0.18s ease, transform 0.12s ease;
      display: inline-flex;
    }

    .socials a:hover {
      color: #1a1a1a;
      transform: translateY(-1px);
    }

    .socials svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="avatar-wrap">
      <!-- Replace src with your actual photo path, e.g. src="photo.jpg" -->
      <img src="photo.jpg" alt="Vibhor Mathur" />
    </div>

    <h1>Vibhor Mathur</h1>

    <p class="bio">
      I'm a writer, story-sharer, community organizer, and occasional joke-teller.
      I've worked on media companies, presidential campaigns, screenplays, and racial justice nonprofits.
    </p>

    <p class="tagline">Come hang with me in the Commons Block</p>

    <div class="buttons">
      <a href="mailto:vjmathur23@gmail.com" class="btn btn-outline">Contact Me</a>
      <a href="https://thecommonsblock.com" target="_blank" rel="noopener" class="btn btn-solid">Writings</a>
    </div>

    <div class="socials">
      <!-- Email -->
      <a href="mailto:vjmathur23@gmail.com" aria-label="Email">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

        </svg>
      </a>

      <a href="https://www.instagram.com/_vibhormathur/" aria-label="Instagram" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

      </a>
    </div>

  </div>
</body>
</html>
